openapi: 3.1.0
info:
  title: AI Vision Face Match API
  version: 1.0.0-oas3.1
  description: Hệ thống API cung cấp dịch vụ nhận diện khuôn mặt (Core Business - AI Vision).
  contact:
    name: FIT4110 Nhóm 11 (B4)
    email: fankz12525@gmail.com
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder
tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: face-match
    description: Xử lý nhận diện khuôn mặt
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint kiểm tra service còn hoạt động.
      tags:
        - health
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: ai-vision-service
                    time: '2026-05-20T08:00:00Z'
  /vision/face-match:
    post:
      operationId: matchFace
      summary: Nhận diện khuôn mặt từ ảnh
      description: |
        Endpoint nhận URL ảnh và phân tích khuôn mặt. 
        **Ràng buộc kỹ thuật (SLA & Limit):**
        - SLA: Phản hồi trong vòng 3 giây (p99). Khuyến cáo Consumer cài đặt timeout 3s và fail-closed.
        - Kích thước ảnh thực tế tải về từ URL không được vượt quá 4MB.
      tags:
        - face-match
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaceMatchRequest'
            examples:
              validRequest:
                value:
                  imageUrl: https://example.com/images/guest-face.jpg
      responses:
        '200':
          description: Xử lý thành công, trả về điểm tin cậy
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdHeaderResponse'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaceMatchResponse'
              examples:
                successMatch:
                  value:
                    detectionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    userId: NV-1714
                    confidence: 0.98
                    timestamp: '2026-05-20T08:01:00Z'
                lowConfidence:
                  value:
                    detectionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babd
                    userId: null
                    confidence: 0.45
                    timestamp: '2026-05-20T08:01:00Z'
        '400':
$ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /vision/detections/{detectionId}:
    get:
      operationId: getDetectionById
      summary: Lấy chi tiết lịch sử nhận diện
      description: Tra cứu lại kết quả phân tích AI (Face hoặc Object) dựa trên UUID.
      tags:
        - face-match
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/DetectionId'
      responses:
        '200':
          description: Chi tiết kết quả nhận diện (Sử dụng Polymorphism)
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdHeaderResponse'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'
              examples:
                faceResult:
                  value:
                    detectionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    detectionType: FACE
                    userId: NV-1714
                    confidence: 0.98
                    status: SUCCESS
                    timestamp: '2026-05-20T08:01:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    DetectionId:
      name: detectionId
      in: path
      required: true
      description: UUID của phiên nhận diện.
      schema:
        type: string
        format: uuid
    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      required: true
      description: Tracing ID định danh request xuyên suốt các service.
      schema:
        type: string
        format: uuid
  headers:
    CorrelationIdHeaderResponse:
      description: Trả lại Tracing ID đã nhận từ request.
      schema:
        type: string
        format: uuid
  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - time
      properties:
        status:
          type: string
          enum:
            - ok
          description: Trạng thái service.
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          description: Tên service.
          example: ai-vision-service
        time:
          type: string
          format: date-time
          description: Thời điểm kiểm tra.
          example: '2026-05-20T08:00:00Z'
    FaceMatchRequest:
      type: object
additionalProperties: false
      required:
        - imageUrl
      properties:
        imageUrl:
          type: string
          format: uri
          minLength: 5
          maxLength: 2048
          description: Đường dẫn URL đến hình ảnh (Giới hạn 2048 ký tự).
          example: https://example.com/images/guest-face.jpg
    FaceMatchResponse:
      type: object
      additionalProperties: false
      required:
        - detectionId
        - confidence
        - timestamp
      properties:
        detectionId:
          type: string
          format: uuid
          description: UUID định danh phiên phân tích.
          example: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
        userId:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 50
          description: Mã nhân viên (null nếu model không nhận diện được ai).
          example: NV-1714
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Độ tin cậy của kết quả (0.0 đến 1.0).
          example: 0.98
        timestamp:
          type: string
          format: date-time
          description: Thời điểm hoàn tất phân tích.
          example: '2026-05-20T08:01:00Z'
    
    # Polymorphism Schema: Áp dụng oneOf và discriminator
    DetectionResult:
      oneOf:
        - $ref: '#/components/schemas/FaceDetectionResult'
        - $ref: '#/components/schemas/ObjectDetectionResult'
      discriminator:
        propertyName: detectionType
        mapping:
          FACE: '#/components/schemas/FaceDetectionResult'
          OBJECT: '#/components/schemas/ObjectDetectionResult'
          
    FaceDetectionResult:
      type: object
      additionalProperties: false
      required:
        - detectionId
        - detectionType
        - confidence
        - status
        - timestamp
      properties:
        detectionId:
          type: string
          format: uuid
        detectionType:
          type: string
          const: FACE
        userId:
          type:
            - string
            - 'null'
        confidence:
          type: number
        status:
          type: string
          enum: [SUCCESS, FAILED]
        timestamp:
          type: string
          format: date-time

    ObjectDetectionResult:
      type: object
      additionalProperties: false
      required:
        - detectionId
        - detectionType
        - label
        - confidence
        - status
        - timestamp
      properties:
        detectionId:
          type: string
          format: uuid
        detectionType:
          type: string
          const: OBJECT
        label:
          type: string
        confidence:
          type: number
        status:
          type: string
          enum: [SUCCESS, FAILED]
        timestamp:
          type: string
          format: date-time

    Problem:
      type: object
additionalProperties: false
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: URI định danh loại lỗi.
          example: https://api.campus.local/errors/validation
        title:
          type: string
          minLength: 3
          maxLength: 120
          description: Tiêu đề lỗi ngắn gọn.
          example: Dữ liệu không hợp lệ
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
          example: 400
        detail:
          type:
            - string
            - 'null'
          maxLength: 500
          description: Mô tả chi tiết lỗi.
          example: Field imageUrl không đúng định dạng URI
        instance:
          type:
            - string
            - 'null'
          format: uri
          description: URI của request gây lỗi.
          example: https://api.campus.local/vision/face-match
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required:
              - field
              - code
              - message
            properties:
              field:
                type: string
                minLength: 1
                maxLength: 80
                example: imageUrl
              code:
                type: string
                minLength: 2
                maxLength: 80
                example: INVALID_FORMAT
              message:
                type: string
                minLength: 3
                maxLength: 200
                example: imageUrl phải là một đường dẫn hợp lệ
  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.campus.local/errors/validation
            title: Dữ liệu không hợp lệ
            status: 400
            detail: Payload không đúng JSON Schema
            instance: https://api.campus.local/vision/face-match
            errors:
              - field: imageUrl
                code: MAX_LENGTH_EXCEEDED
                message: Độ dài chuỗi vượt quá 2048 ký tự
    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.campus.local/errors/unauthorized
            title: Chưa xác thực
            status: 401
            detail: Thiếu Bearer token
            instance: https://api.campus.local/vision/face-match
            errors: []
    NotFound:
      description: Resource không tồn tại
      content:
application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Payload đúng định dạng nhưng vi phạm quy tắc nghiệp vụ (VD URL ảnh chết)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalServerError:
      description: Lỗi không mong muốn phía server
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'